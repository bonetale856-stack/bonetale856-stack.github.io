<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#007aff">
    <title>Вход | Гильдия Сервис</title>
    
    <!-- Подключение манифеста -->
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <!-- Иконки FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Базовые стили */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        /* Карточка входа */
        .login-card { 
            width: 100%; 
            max-width: 350px; 
            text-align: center; 
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* Логотип (SVG контейнер) */
        .logo-container {
            width: 80px; 
            height: 80px; 
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Поля ввода */
        .form-group { margin-bottom: 15px; }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-control:focus { border-color: #007aff; }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        .btn-primary { background: #007aff; color: white; }
        .btn-primary:active { opacity: 0.8; }
        
        /* Контейнер кнопки установки PWA */
        #installContainer { 
            margin-top: 20px; 
            display: none; /* Скрыто по умолчанию */
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Статус и лоадер */
        .status-text { margin-top: 15px; font-size: 14px; min-height: 20px; }
        .global-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .global-loader.active { opacity: 1; pointer-events: all; }
        .fa-spin { font-size: 40px; color: #007aff; margin-bottom: 10px; }
        .loader-text { color: #555; font-weight: 500; }
    </style>
</head>
<body>

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="globalLoader" class="global-loader">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        <div id="loaderText" class="loader-text">Загрузка...</div>
    </div>

    <div class="card login-card">
        <!-- SVG ЛОГОТИП (Встроенный) -->
        <div class="logo-container">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 50px; height: 50px;">
                <path d="M12 2L2 7V12C2 17.55 6.84 22.25 12 23.5C17.16 22.25 22 17.55 22 12V7L12 2Z" fill="#E5F1FF"/>
                <path d="M12 22C16.9706 22 21 17.9706 21 13C21 8.02944 16.9706 4 12 4C7.02944 4 3 8.02944 3 13C3 17.9706 7.02944 22 12 22Z" stroke="#007AFF" stroke-width="2"/>
                <path d="M9 13L11 15L15 11" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <rect x="8" y="17" width="8" height="2" rx="1" fill="#007AFF"/>
            </svg>
        </div>

        <h2 style="margin-top: 0; color: #333;">Гильдия Сервис</h2>
        
        <div class="form-group">
            <input type="text" class="form-control" id="userName" placeholder="Ваше ФИО" autocomplete="off">
        </div>
        <div class="form-group">
            <input type="password" class="form-control" id="userPin" placeholder="ПИН-код" pattern="[0-9]*" inputmode="numeric">
        </div>
        
        <button class="btn btn-primary" onclick="login()">Войти в систему</button>
        
        <!-- КНОПКА УСТАНОВКИ ПРИЛОЖЕНИЯ (PWA) -->
        <div id="installContainer">
            <button id="installBtn" class="btn" style="background: #28a745; color: white;">
                <i class="fa-solid fa-download"></i> Установить приложение
            </button>
        </div>

        <div id="status" class="status-text"></div>
    </div>

    <script>
        // === 1. ПРОВЕРКА АВТОРИЗАЦИИ ПРИ ЗАГРУЗКЕ ===
        window.onload = function() {
            const userStr = localStorage.getItem("currentUser");
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    if (user.role === "диспетчер") window.location.replace("dispatcher.html");
                    else if (user.role === "мастер") window.location.replace("master.html");
                    else if (user.role === "шеф") window.location.replace("boss.html");
                } catch(e) { console.error("Ошибка парсинга пользователя", e); }
            }
            
            // Регистрация Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('Service Worker зарегистрирован'))
                    .catch(err => console.log('Ошибка SW', err));
            }
        };

        // === 2. ЛОГИКА ЗАГРУЗКИ ===
        function showLoader(text) {
            document.getElementById("loaderText").innerText = text;
            document.getElementById("globalLoader").classList.add("active");
        }
        function hideLoader() {
            document.getElementById("globalLoader").classList.remove("active");
        }

        const URL_GOOGLE_SERVER = "https://script.google.com/macros/s/AKfycbxfMMoR5LATkWt4HeT8XCxjOipYSay-c_9YVZExPPZ9edVLciR4YbHrqjadC_nSdFGfjg/exec";

        async function login() {
            const nameInput = document.getElementById("userName").value.trim();
            const pinInput = document.getElementById("userPin").value.trim();
            const statusText = document.getElementById("status");

            if (!nameInput || !pinInput) {
                statusText.innerText = "Заполните ФИО и ПИН-код";
                statusText.style.color = "#ff3b30";
                return;
            }

            statusText.innerText = "";
            showLoader("Проверка данных...");

            const loginData = { action: "login", name: nameInput, pin: pinInput };

            try {
                const response = await fetch(URL_GOOGLE_SERVER, {
                    method: "POST",
                    body: JSON.stringify(loginData),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                
                const result = await response.json();

                if (result.status === "success") {
                    localStorage.setItem("currentUser", JSON.stringify(result.user));
                    showLoader("Успешно! Входим...");
                    
                    setTimeout(() => {
                        if (result.user.role === "диспетчер") window.location.replace("dispatcher.html");
                        else if (result.user.role === "мастер") window.location.replace("master.html");
                        else if (result.user.role === "шеф") window.location.replace("boss.html");
                    }, 500);
                } else {
                    hideLoader();
                    statusText.innerText = "Неверное ФИО или ПИН-код";
                    statusText.style.color = "#ff3b30";
                }
            } catch (error) {
                hideLoader();
                statusText.innerText = "Ошибка связи с сервером.";
                statusText.style.color = "#ff3b30";
            }
        }

        // === 3. ЛОГИКА PWA УСТАНОВКИ (Android/iOS) ===
        let deferredPrompt;
        const installContainer = document.getElementById('installContainer');
        const installBtn = document.getElementById('installBtn');

        // Слушаем событие готовности к установке (работает на Android/Chrome)
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Отменяем нативный промпт
            deferredPrompt = e; // Сохраняем событие
            if (installContainer) installContainer.style.display = 'block'; // Показываем кнопку
            console.log('PWA: Кнопка установки активирована');
        });

        // Обработка клика по кнопке "Установить"
        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                
                deferredPrompt.prompt(); // Вызываем диалог
                
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`PWA: Выбор пользователя: ${outcome}`);
                
                // Скрываем кнопку после попытки установки
                if (installContainer) installContainer.style.display = 'none';
                deferredPrompt = null;
            });
        }

        // Специальная обработка для iOS (так как там нет beforeinstallprompt)
        function isIos() {
            const ua = window.navigator.userAgent;
            return /iphone|ipad|ipod/.test(ua.toLowerCase()) && !window.MSStream;
        }

        function isStandalone() {
            return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        }

        if (isIos() && !isStandalone()) {
            if (installContainer) {
                installContainer.style.display = 'block';
                if (installBtn) {
                    installBtn.innerHTML = '<i class="fa-solid fa-share-from-square"></i> Инструкция для iOS';
                    installBtn.style.background = '#007aff';
                    installBtn.onclick = function() {
                        alert(' Чтобы установить приложение:\n\n1. Нажмите кнопку "Поделиться" внизу браузера (квадрат со стрелкой) ↗️\n2. В меню выберите "На экран «Домой»" \n3. Нажмите "Добавить"');
                    };
                }
            }
        }

        // Если уже запущено как приложение - скрываем кнопку
        if (isStandalone() && installContainer) {
            installContainer.style.display = 'none';
        }
    </script>
</body>
</html>
